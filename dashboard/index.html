<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ESP32 MQTT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="dashboard-navbar fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="#" class="brand">
                <i class="bi bi-cpu"></i>ESP32<span style="color:var(--accent-amber)">Dashboard</span>
            </a>
            <div class="clock">
                <i class="bi bi-clock"></i><span id="reloj">--:--:--</span>
            </div>
            <div class="conn-indicator">
                <span class="conn-dot offline" id="connDot"></span>
                <span id="connLabel" style="color:var(--text-muted)">Desconectado</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="container">

            <div class="row g-3">

                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h6><i class="bi bi-wifi me-2"></i>Conexión MQTT</h6>
                            <span class="badge-conn" id="mqttBadge" style="background:rgba(239,68,70,0.15);color:var(--accent-red)">Desconectado</span>
                        </div>
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-3 mb-2">
                                <div style="width:44px;height:44px;border-radius:12px;background:rgba(59,130,246,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <i class="bi bi-router" style="font-size:1.3rem;color:var(--accent-blue)"></i>
                                </div>
                                <div>
                                    <div class="status-label">Broker</div>
                                    <div class="status-value small" style="font-size:0.85rem">broker.hivemq.com:8000</div>
                                </div>
                            </div>
                            <div class="conn-detail">Cliente: <span id="clientIdSpan">—</span></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h6><i class="bi bi-lightning me-2"></i>Control Relé</h6>
                            <i class="bi bi-toggle-on" id="releIcon" style="color:var(--text-dim);transition:color 0.3s ease"></i>
                        </div>
                        <div class="card-body text-center">
                            <div class="status-label">Estado actual</div>
                            <div class="state-display idle" id="estadoEsp32">—</div>
                            <div class="last-update mb-3" id="lastUpdate"></div>
                            <div class="d-flex gap-2 justify-content-center mt-2">
                                <button class="btn-control btn-control-on" id="btnOn">
                                    <i class="bi bi-power"></i>Encender
                                </button>
                                <button class="btn-control btn-control-off" id="btnOff">
                                    <i class="bi bi-power"></i>Apagar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h6><i class="bi bi-activity me-2"></i>Estado ESP32</h6>
                            <i class="bi bi-check-circle" style="color:var(--text-dim)"></i>
                        </div>
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-3">
                                <div style="width:52px;height:52px;border-radius:14px;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.3s ease" id="stateIconWrap">
                                    <i class="bi bi-cpu" style="font-size:1.5rem;color:var(--text-dim);transition:color 0.3s ease" id="stateIcon"></i>
                                </div>
                                <div>
                                    <div class="status-label">Último mensaje</div>
                                    <div class="status-value" id="ultimoMensaje">Sin datos</div>
                                    <div class="last-update mt-1" id="lastMsgTime"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                </div>

            <div class="row g-3 mt-1">
                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h6><i class="bi bi-soundwave me-2"></i>Sensor Ultrasónico</h6>
                            <span class="badge-presence" id="presenceBadge">—</span>
                        </div>
                        <div class="card-body text-center">
                            <div class="status-label">Distancia</div>
                            <div class="distance-display" id="distanceDisplay">— cm</div>
                            <div class="status-label mt-3">Presencia</div>
                            <div class="presence-value" id="presenceValue">—</div>
                            <div class="last-update mt-2" id="sensorUpdate"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h6><i class="bi bi-door-open me-2"></i>Puerta / Servo</h6>
                            <span class="badge-door" id="doorBadge">—</span>
                        </div>
                        <div class="card-body text-center">
                            <div class="door-icon" id="doorIcon">
                                <i class="bi bi-door-closed"></i>
                            </div>
                            <div class="status-label mt-2">Estado</div>
                            <div class="door-display" id="doorDisplay">—</div>
                            <div class="last-update mt-2" id="doorUpdate"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mt-1">
                <div class="col-12">
                    <div class="dashboard-card log-card">
                        <div class="card-header">
                            <h6><i class="bi bi-terminal me-2"></i>Registro de eventos</h6>
                            <button class="clear-log-btn" id="clearLog"><i class="bi bi-trash3 me-1"></i>Limpiar</button>
                        </div>
                        <div class="card-body">
                            <div class="log-container" id="log"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
